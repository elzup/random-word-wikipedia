# Publishes to npm when a GitHub Release is published.
# Auth via npm Trusted Publishing (OIDC) — no token needed.
# Requires: a Trusted Publisher configured on npmjs.com for this repo +
# this workflow file, and `id-token: write` below. Provenance is automatic.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: node --test
      - run: npm publish --provenance --access public
