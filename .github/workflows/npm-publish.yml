# Publishes to npm on a pushed v* tag.
# Auth: npm Trusted Publishing (OIDC) — no token. Provenance is automatic.
# Requires a Trusted Publisher on npmjs.com matching exactly:
#   Owner: elzup
#   Repository: random-word-wikipedia
#   Workflow filename: npm-publish.yml
#   Environment: (empty)
# Node 24 ships npm >= 11.5.1 (OIDC requirement). No `npm ci` — zero deps,
# no lockfile.

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm test
      - run: npm publish
