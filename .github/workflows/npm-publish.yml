# Publishes to npm when a GitHub Release is published.
# Auth via npm Trusted Publishing (OIDC) — no token needed.
# Requires: a Trusted Publisher configured on npmjs.com for this repo +
# this workflow file, and `id-token: write` below. Provenance is automatic.
#
# Do NOT set `registry-url` on setup-node: it writes an .npmrc with a
# placeholder NODE_AUTH_TOKEN, which makes npm use (broken) token auth and
# skip the OIDC exchange. Node 24 ships npm >= 11.5.1 (OIDC requirement).

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: node --test
      - run: npm publish --provenance --access public
