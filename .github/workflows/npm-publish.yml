# Publishes to npm when a GitHub Release is published.
# Auth via npm Trusted Publishing (OIDC) — no token needed.
# Requires: a Trusted Publisher configured on npmjs.com for this repo +
# this workflow file, and `id-token: write` below. Provenance is automatic.
# Needs actions/setup-node@v6 (v4 writes an .npmrc that disables OIDC) and
# npm >= 11.5.1 / Node >= 22.14.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm install -g npm@latest # ensure npm >= 11.5.1 for OIDC
      - run: node --test
      - run: npm publish --provenance --access public
