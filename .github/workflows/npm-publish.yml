# Publishes to npm when a GitHub Release is published.
# Auth: NPM_TOKEN secret (must be a classic "Automation" token so it
# bypasses 2FA in CI). `id-token: write` is only for provenance signing.
# Mirrors the working setup in elzup/hash-omikuji.

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
      - run: node --test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
